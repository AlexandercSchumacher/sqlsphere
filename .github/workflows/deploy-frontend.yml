name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "lovable/query-sage-lab/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: lovable/query-sage-lab/package-lock.json

      - name: Install
        working-directory: lovable/query-sage-lab
        run: npm ci --no-fund --no-audit

      - name: Build (LOCAL_MODE / localhost backend)
        working-directory: lovable/query-sage-lab
        env:
          # The deployed bundle assumes recruiters run the backend
          # locally via `docker compose up`. The browser at sqlsphere.com
          # then talks to http://localhost:8000.
          VITE_BACKEND_URL: http://localhost:8000
          VITE_LOCAL_MODE: "true"
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sqlsphere
          directory: lovable/query-sage-lab/dist
          branch: ${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
