name: Build & Upload SQLSphere Agent

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false      # run all three even if one fails
      matrix:
        include:
          - os: windows-latest
            python-version: '3.11'
            artifact: SQLSphere-Agent-Windows-Setup.exe
            upload_name: SQLSphere-Agent-Windows-Setup.exe
          - os: macos-latest
            python-version: '3.12'    # 3.12 ships Tk 8.6.14 — fixes GetRGBA crash on macOS 15
            artifact: SQLSphere-Agent-Mac.dmg
            upload_name: SQLSphere-Agent-Mac.dmg
          - os: ubuntu-22.04
            python-version: '3.11'
            artifact: SQLSphere-Agent
            upload_name: SQLSphere-Agent-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── System deps: Linux ───────────────────────────────────────────────
      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            unixodbc-dev \
            libayatana-appindicator3-dev \
            gir1.2-ayatanaappindicator3-0.1 \
            python3-gi \
            libgirepository1.0-dev \
            gcc \
            pkg-config

      # ── System deps: macOS ───────────────────────────────────────────────
      - name: System deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install unixodbc create-dmg
          echo "LDFLAGS=-L$(brew --prefix unixodbc)/lib"       >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix unixodbc)/include"  >> $GITHUB_ENV

      # ── pip deps ─────────────────────────────────────────────────────────
      - name: Install Python deps
        shell: bash   # force bash on all OSes — PowerShell rejects \ line continuations
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller
          pip install websockets "psycopg2-binary>=2.9" "mysql-connector-python>=9.0" "customtkinter>=5.2" "darkdetect>=0.8" "Pillow>=10.0" "pystray>=0.19"
          pip install pyodbc

      # ── Build ────────────────────────────────────────────────────────────
      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --clean SQLSphere-Agent-Mac.spec

      - name: Build with PyInstaller (Windows / Linux)
        if: runner.os != 'macOS'
        run: pyinstaller --clean SQLSphere-Agent.spec

      # ── macOS: ad-hoc code sign + create DMG ────────────────────────────
      - name: Ad-hoc code sign (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - "dist/SQLSphere-Agent.app"
          codesign --verify --deep --strict "dist/SQLSphere-Agent.app"
          echo "Signed OK"

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "SQLSphere Agent" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "SQLSphere-Agent.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist/SQLSphere-Agent-Mac.dmg" \
            "dist/SQLSphere-Agent.app"

      # ── Windows: create installer with Inno Setup ───────────────────────
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        run: iscc installer.iss

      # ── Verify output exists ─────────────────────────────────────────────
      - name: Verify artifact (Unix)
        if: runner.os != 'Windows'
        run: ls -lh dist/${{ matrix.artifact }}

      - name: Verify artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-Item "dist\${{ matrix.artifact }}"

      # ── Upload to Supabase Storage ───────────────────────────────────────
      - name: Upload to Supabase (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          $bytes   = [System.IO.File]::ReadAllBytes("dist\${{ matrix.artifact }}")
          $uri     = "$env:SUPABASE_URL/storage/v1/object/agent-downloads/${{ matrix.upload_name }}"
          $headers = @{
            "Authorization" = "Bearer $env:SUPABASE_SERVICE_KEY"
            "Content-Type"  = "application/octet-stream"
            "x-upsert"      = "true"
          }
          Invoke-RestMethod -Uri $uri -Method Put -Headers $headers -Body $bytes

      - name: Upload to Supabase (macOS / Linux)
        if: runner.os != 'Windows'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary @dist/${{ matrix.artifact }} \
            "${SUPABASE_URL}/storage/v1/object/agent-downloads/${{ matrix.upload_name }}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Response body: $BODY"
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "Upload failed with status $HTTP_STATUS"
            exit 1
          fi

      # ── Keep artifact in GitHub as fallback ──────────────────────────────
      - name: Save GitHub artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.upload_name }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30
