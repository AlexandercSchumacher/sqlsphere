services:
  postgres:
    image: postgres:16-alpine
    container_name: sqlsphere-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: sqlsphere
    volumes:
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sqlsphere"]
      interval: 2s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sqlsphere-backend
    environment:
      LOCAL_MODE: "true"
      DATABASE_URL: postgresql://postgres:demo@postgres:5432/sqlsphere
      ALLOWED_ORIGINS: "https://sqlsphere.com,http://localhost:5173,http://localhost:8080"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ACTIVE_MODEL: ${ACTIVE_MODEL:-claude}
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # Self-contained frontend: builds the Vite bundle and serves it
  # alongside a reverse proxy to the backend on the same port. With
  # this you get a single same-origin HTTP URL that works in every
  # browser including Safari. Open http://localhost:8080.
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: sqlsphere-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
