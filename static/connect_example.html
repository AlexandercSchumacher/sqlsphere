<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Connection Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .session-info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
        }
        
        .session-info h3 {
            margin-bottom: 10px;
            color: #0066cc;
        }
        
        .session-info code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            word-break: break-all;
        }
        
        .actions {
            margin-top: 20px;
            display: none;
        }
        
        .actions button {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗂️ Database Connection</h1>
        <p>Connect to your database to start visualization</p>
        
        <form id="connectionForm">
            <div class="form-group">
                <label for="type">Database Type</label>
                <select id="type" required>
                    <option value="mysql">MySQL</option>
                    <option value="sqlserver">SQL Server</option>
                    <option value="postgresql">PostgreSQL</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="host">Host</label>
                <input type="text" id="host" value="127.0.0.1" required>
            </div>
            
            <div class="form-group">
                <label for="port">Port</label>
                <input type="number" id="port" value="3306" required>
            </div>
            
            <div class="form-group">
                <label for="database">Database Name</label>
                <input type="text" id="database" value="employees" required>
            </div>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" value="newuser" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" value="Abcdefg123&" required>
            </div>
            
            <button type="submit" id="connectBtn">🔌 Connect to Database</button>
        </form>
        
        <div id="status" class="status"></div>
        
        <div id="sessionInfo" class="session-info">
            <h3>✅ Connected Successfully!</h3>
            <p><strong>Session ID:</strong><br><code id="sessionId"></code></p>
            <p><strong>Database:</strong> <span id="dbInfo"></span></p>
            <p><strong>Expires:</strong> <span id="expiryTime"></span></p>
        </div>
        
        <div id="actions" class="actions">
            <button onclick="openVisualization()">📊 Open Visualization</button>
            <button onclick="getTables()">📋 List Tables</button>
            <button onclick="getViews()">👁️ List Views</button>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        let currentSessionId = null;
        
        document.getElementById('connectionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const connectBtn = document.getElementById('connectBtn');
            const statusDiv = document.getElementById('status');
            
            // Disable button and show loading
            connectBtn.disabled = true;
            connectBtn.textContent = '⏳ Connecting...';
            statusDiv.style.display = 'none';
            
            // Get form data
            const credentials = {
                type: document.getElementById('type').value,
                host: document.getElementById('host').value,
                port: parseInt(document.getElementById('port').value),
                database: document.getElementById('database').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                connectionMethod: 'standard'
            };
            
            try {
                // Call FastAPI backend /connect endpoint
                const response = await fetch(`${API_BASE}/connect`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(credentials)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Connection failed');
                }
                
                if (data.success) {
                    currentSessionId = data.session_id;
                    
                    // Show success status
                    statusDiv.className = 'status success';
                    statusDiv.textContent = `✅ ${data.message}`;
                    statusDiv.style.display = 'block';
                    
                    // Show session info
                    document.getElementById('sessionId').textContent = data.session_id;
                    document.getElementById('dbInfo').textContent = 
                        `${data.database_type} - ${data.database_name}`;
                    
                    const expiryTime = new Date(Date.now() + 2 * 60 * 60 * 1000);
                    document.getElementById('expiryTime').textContent = 
                        expiryTime.toLocaleTimeString();
                    
                    document.getElementById('sessionInfo').style.display = 'block';
                    document.getElementById('actions').style.display = 'block';
                    
                    // Store in localStorage
                    localStorage.setItem('db_session_id', data.session_id);
                    
                } else {
                    throw new Error(data.error || 'Connection failed');
                }
                
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ ${error.message}`;
                statusDiv.style.display = 'block';
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = '🔌 Connect to Database';
            }
        });
        
        function openVisualization() {
            if (!currentSessionId) {
                alert('No active session');
                return;
            }
            
            const url = `${API_BASE}/visualization/html?session_id=${currentSessionId}&level=table`;
            window.open(url, '_blank');
        }
        
        async function getTables() {
            if (!currentSessionId) return;
            
            try {
                const response = await fetch(`${API_BASE}/tables?session_id=${currentSessionId}`);
                const data = await response.json();
                
                alert(`Found ${data.count} tables:\n\n${data.tables.map(t => t.full_name).join('\n')}`);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        async function getViews() {
            if (!currentSessionId) return;
            
            try {
                const response = await fetch(`${API_BASE}/views?session_id=${currentSessionId}`);
                const data = await response.json();
                
                alert(`Found ${data.count} views:\n\n${data.views.map(v => v.full_name).join('\n')}`);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Check for existing session on load
        window.addEventListener('load', () => {
            const storedSessionId = localStorage.getItem('db_session_id');
            if (storedSessionId) {
                currentSessionId = storedSessionId;
                // Verify session is still valid
                fetch(`${API_BASE}/session/${storedSessionId}`)
                    .then(res => res.json())
                    .then(data => {
                        document.getElementById('sessionId').textContent = data.session_id;
                        document.getElementById('dbInfo').textContent = 
                            `${data.database_type} - ${data.database_name}`;
                        document.getElementById('expiryTime').textContent = 
                            new Date(data.expires_at).toLocaleTimeString();
                        document.getElementById('sessionInfo').style.display = 'block';
                        document.getElementById('actions').style.display = 'block';
                    })
                    .catch(() => {
                        localStorage.removeItem('db_session_id');
                    });
            }
        });
    </script>
</body>
</html>
