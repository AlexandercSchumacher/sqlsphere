<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Beziehungs-Visualisierung</title>
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <style>
        #cy {
            width: 100%;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>
    <div id="cy"></div>

    <script>
        fetch("http://localhost:8000/relationships")
            .then(res => res.json())
            .then(data => {
                const elements = [];

                data.forEach(rel => {
                    elements.push({ data: { id: rel.source, label: rel.source } });
                    elements.push({ data: { id: rel.target, label: rel.target } });
                    elements.push({ data: { source: rel.source, target: rel.target } });
                });

                const uniqueElements = elements.filter((v,i,a)=>a.findIndex(t=>t.data.id===v.data.id && t.data.source===v.data.source && t.data.target===v.data.target)===i);

                cytoscape({
                    container: document.getElementById('cy'),
                    elements: uniqueElements,
                    style: [
                        {
                            selector: 'node',
                            style: {
                                'label': 'data(label)',
                                'text-valign': 'center',
                                'text-halign': 'center',
                                'background-color': '#0074D9',
                                'color': '#fff'
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 2,
                                'line-color': '#ccc',
                                'target-arrow-color': '#ccc',
                                'target-arrow-shape': 'triangle'
                            }
                        }
                    ],
                    layout: {
                        name: 'cose'
                    }
                });
            });
    </script>
</body>
</html>
