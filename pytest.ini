[pytest]
markers =
    core: Core profile connection matrix tests
    aws: AWS IAM profile connection matrix tests
    azure_ad: Azure AD profile connection matrix tests
    kerberos_windows: Kerberos/Windows auth profile connection matrix tests
    core_windows_sqlserver: Core SQL Server matrix tests (pipe + Encrypt=strict) on Windows runners
    ci_tls_connection_string: Self-contained CI tests for TLS and connection_string coverage
    ci_ssh: Self-contained CI tests for SSH connection method coverage
