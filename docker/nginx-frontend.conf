server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # FastAPI backend paths get proxied to the `backend` service in
    # docker-compose. Everything else is treated as a frontend route
    # (SPA fallback to index.html).
    location ~ ^/(api|query|chat|connect|session|tables|views|columns|object-definition|upload|visualization|relationships|view-dependencies|column-dependencies|column-info|procedures|triggers|sequences|materialized-views|ws)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # SPA fallback: any non-matching path serves index.html so
    # client-side routing (react-router) handles the URL.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite emits hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
